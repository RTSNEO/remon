<!DOCTYPE html>
<html>
<head>
    <title>Agent Test Page</title>
    <style>
        .active { background-color: blue; color: white; }
        .selected { border: 2px solid green; }
    </style>
</head>
<body>
    <h1>LinkedIn-like Filter Test</h1>
    
    <button id="btn1" aria-pressed="true">Easy Apply (Pressed)</button>
    <button id="btn2" class="active">KSA Jobs (Active Class)</button>
    <button id="btn3" class="selected">Full Time (Selected Class)</button>
    <button id="btn4" disabled>Disabled Filter</button>
    <button id="btn5">Normal Filter (Unselected)</button>

    <div role="checkbox" aria-checked="true" id="chk1">Aria Checked Item</div>
</body>
</html>
