<!DOCTYPE html>
<html>
<head>
  <title>Gemini Auto Browser</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 10px;
      margin: 0;
      background-color: #f8f9fa;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      color: #202124;
    }
    textarea {
      width: 100%;
      height: 80px;
      box-sizing: border-box;
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      resize: vertical;
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    #startBtn {
      background-color: #1a73e8;
      color: white;
    }
    #startBtn:disabled {
      background-color: #8ab4f8;
      cursor: not-allowed;
    }
    #stopBtn {
      background-color: #d93025;
      color: white;
    }
    #stopBtn:disabled {
      background-color: #f28b82;
      cursor: not-allowed;
    }
    #logArea {
      width: 100%;
      height: 200px;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background-color: white;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .status {
      font-size: 12px;
      margin-bottom: 10px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <h2>Gemini Auto Browser</h2>

  <div class="status" id="statusText">Status: Idle</div>

  <textarea id="goalInput" placeholder="Enter your goal (e.g., 'Find and apply for software engineering jobs on LinkedIn')"></textarea>

  <div class="button-group">
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <h3>Action Log</h3>
  <div id="logArea"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
